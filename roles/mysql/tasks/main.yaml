- name: install MySQL server
  ansible.builtin.dnf:
    name: mysql-server
    state: present


- name: start and enable mysql server
  ansible.builtin.service:
    name: mysqld
    state: restarted
    enabled: yes

- name: install boto3 and botocore for retreiving the MYSQL_ROOT_PASSWORD password from ssm parameters from group_vars
  ansible.builtin.pip:
    name: "{{ item }}"
    executable: pip3.9
  loop:
  - boto3
  - botocore

- name: setup root password
  ansible.builtin.command: mysql_secure_installation --set-root-pass "{{ MYSQL_ROOT_PASSWORD }}"